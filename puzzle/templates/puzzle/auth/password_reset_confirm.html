{% extends "puzzles/base.html" %}
{% block title %}Enter New Password{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Set New Password</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_new_password1" class="form-label">New Password</label>
                            <input type="password" name="new_password1" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_new_password2" class="form-label">Confirm Password</label>
                            <input type="password" name="new_password2" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Change Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
